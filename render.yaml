services:
  - type: web
    name: agentrix-mcp
    runtime: docker
    dockerfilePath: ./backend/Dockerfile.mcp
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: MCP_TRANSPORT
        value: http
      - key: MCP_HOST
        value: 0.0.0.0
      - key: MCP_PATH
        value: /mcp
      - key: API_BASE_URL
        sync: false
