services:
  mcp:
    build:
      context: .
      dockerfile: backend/Dockerfile.mcp
    image: agentrix-mcp:local
    ports:
      - "8001:8001"
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://host.docker.internal:8000}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8001
      MCP_PATH: /mcp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    profiles:
      - backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: agentrix-backend:local
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MCP_SERVER_URL: http://mcp:8001
      MCP_SERVER_TRANSPORT: http
    depends_on:
      mcp:
        condition: service_healthy
