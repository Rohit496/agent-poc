<!-- Floating FAB -->
<button class="fab" (click)="toggle()" [class.fab-open]="isOpen()" aria-label="Open chat assistant">
  <svg *ngIf="!isOpen()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="26" height="26">
    <path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
  </svg>
  <svg *ngIf="isOpen()" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="24" height="24">
    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
  </svg>
</button>

<!-- Chat Panel -->
<div class="chat-panel" [class.chat-open]="isOpen()">

  <!-- Header -->
  <div class="chat-header">
    <div class="agent-avatar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="18" height="18">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
      </svg>
    </div>
    <div>
      <p class="agent-name">Agentrix Assistant</p>
      <p class="agent-status">
        <span class="status-dot"></span> Online · AI powered
      </p>
    </div>
  </div>

  <!-- Messages -->
  <div class="messages">
    <div
      *ngFor="let msg of messages()"
      class="message"
      [class.user-message]="msg.role === 'user'"
      [class.agent-message]="msg.role === 'agent'"
    >
      <div class="bubble" [class.loading-bubble]="msg.loading">
        <ng-container *ngIf="!msg.loading; else spinner">
          <span [innerHTML]="msg.text | formatMessage"></span>
        </ng-container>
        <ng-template #spinner>
          <span class="typing-dots"><span></span><span></span><span></span></span>
        </ng-template>
      </div>
    </div>
    <!-- Suggestion chips — visible only before user sends first message -->
    <div class="suggestions" *ngIf="showSuggestions">
      <button
        *ngFor="let s of suggestions"
        class="suggestion-chip"
        (click)="useSuggestion(s)"
      >{{ s }}</button>
    </div>

    <div #messagesEnd></div>
  </div>

  <!-- Input -->
  <div class="chat-input-bar">
    <textarea
      rows="1"
      placeholder="e.g. Show servers for P-10042..."
      [(ngModel)]="inputText"
      (keydown)="onKeydown($event)"
      [disabled]="loading()"
    ></textarea>
    <button (click)="send()" [disabled]="!canSend" aria-label="Send">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="20" height="20">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
</div>
